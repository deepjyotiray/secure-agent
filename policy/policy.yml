# Global default policy — generic, domain-agnostic.
# Workspace-specific policies override this (data/workspaces/<id>/policy.yml).

allowed_intents:
  - greet
  - help
  - show_menu
  - order_status
  - place_order
  - general_chat
  - support

restricted_intents:
  - login
  - create_order

domain_keywords:
  - order
  - buy
  - cart
  - checkout
  - price
  - delivery
  - status
  - payment
  - invoice
  - receipt
  - track
  - item
  - product
  - service
  - catalog
  - menu
  - help
  - support
  - hi
  - hello
  - hey
  - thanks
